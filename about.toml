# cargo-about config for S4 third-party license disclosure (#104).
#
# `accepted` lists SPDX expressions our deps are licensed under that we
# acknowledge as compatible with our Apache-2.0 distribution. Any crate
# with a license outside this list blocks `cargo about generate` until
# the license is explicitly added or the crate is removed.

accepted = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
    "MPL-2.0",
    "BSL-1.0",
    "MIT-0",
    "Unlicense",
    "OpenSSL",
    # webpki-roots ships under CDLA-Permissive-2.0 (Mozilla CA bundle redistribution).
    # https://cdla.dev/permissive-2-0/ — permissive, attribution-only.
    "CDLA-Permissive-2.0",
]

# Generate disclosure for the targets we actually ship to.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "wasm32-unknown-unknown",
]
