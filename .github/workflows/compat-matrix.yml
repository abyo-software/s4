name: Backend Compatibility Matrix

# Action-version policy: see `.github/workflows/ci.yml` top comment.
# All JavaScript actions pinned to a Node.js 24-ready major per the
# v0.11 #A5 migration; tag existence verified via `gh api`. Codex
# audit R5 / R6 false-flagged these as "unpublished" twice due to
# sandbox network limitations — every workflow run since v0.11
# wave-1 ship (commit 3332f3e) resolves them cleanly.

# v0.11 #A7 — explicit E2E verification across every S3-compatible
# backend S4 claims support for. Until now the only backends with
# CI-verified compat evidence were MinIO (via the testcontainers-
# driven http_e2e / multipart_e2e suites in `crates/s4-server/tests/`)
# and real AWS S3 (via `aws-e2e.yml`). README §"How it Compares"
# and §"Quick Start" list MinIO / Garage / Ceph RGW / Wasabi / B2 /
# R2 as backends S4 is intended to front, but Garage / Ceph RGW /
# B2 / R2 / Wasabi had no automated coverage — the "should work"
# claim rested on wire-shape similarity alone.
#
# This workflow closes that gap with a 1 PUT + 1 GET + sidecar HEAD
# round-trip per backend through a live s4-server. Two tiers:
#
#   Docker-based jobs (no secrets, runs every cron firing):
#     - MinIO        — quay.io/minio/minio:latest
#     - Garage       — dxflrs/garage:v1.1.0
#     - Ceph RGW     — quay.io/ceph/demo:latest-quincy (best-effort:
#                      the demo image is no longer actively maintained
#                      upstream, so a startup / pull failure is
#                      reported as a warning and does NOT fail the
#                      workflow — this lets MinIO + Garage continue
#                      to gate while operators decide whether to
#                      pin a newer ceph image)
#
#   Real-cloud jobs (each gated on operator-provided vars/secrets;
#     skips silently when the backend isn't configured):
#     - Backblaze B2     — vars: B2_BUCKET / B2_ENDPOINT / B2_REGION
#                          secrets: B2_KEY_ID / B2_APPLICATION_KEY
#     - Cloudflare R2    — vars: R2_BUCKET / R2_ENDPOINT / R2_REGION
#                          secrets: R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
#     - Wasabi           — vars: WASABI_BUCKET / WASABI_ENDPOINT / WASABI_REGION
#                          secrets: WASABI_ACCESS_KEY_ID / WASABI_SECRET_ACCESS_KEY
#
#   The real-cloud rows additionally run a v1.5 (#143) multipart
#   probe: a must-pass 4-part mixed-compressibility upload through
#   an s4 instance running `--uniform-multipart-parts`, plus (R2
#   only) a flag-off informational check of whether R2 still
#   enforces its uniform-part-size rule. See the comment block
#   above those steps in `realcloud-compat` for the rationale and
#   the CRT chunk-size false-negative guard.
#
# Why a separate workflow vs adding to ci.yml:
#   - cost: real-cloud backends bill per request + egress, so we
#     keep these off PR runs and on a weekly schedule instead
#   - blast radius: a Garage / Ceph regression should not block PR
#     merges (these backends are best-effort compat); ci.yml stays
#     the merge-gate workflow
#   - independence: each real-cloud backend's vars/secrets can be
#     enabled per-operator without touching ci.yml
#
# Why weekly (not nightly) cron:
#   - real-cloud egress / request costs scale with frequency; weekly
#     is the lightest cadence that still catches wire breaks within
#     one release cycle
#   - aligned with `fuzz-nightly.yml` cadence philosophy: nightly
#     for things that touch only repo resources, weekly for things
#     that touch external paid resources or that take >30min
#
# Triggers:
#   - weekly Sunday 06:00 UTC (cron)
#   - manual via workflow_dispatch (operators iterating on a new
#     backend's vars/secrets config want a sub-week feedback loop)

on:
  schedule:
    - cron: "0 6 * * 0"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Bucket + key reused by every backend job. Random body of
  # TEST_SIZE_BYTES is generated per-job so concurrent runs against
  # the same bucket name (only matters on real-cloud backends with a
  # shared operator-provided bucket) don't collide on content even
  # if they share the key.
  TEST_BUCKET: s4-compat-test
  # v0.11-audit-R2 P2 (Codex): run-scoped key. Was a fixed
  # `compat/large.bin` — on real-cloud rows the bucket is
  # operator-pre-provisioned and reused across weekly runs, so a
  # previous run's sidecar at `compat/large.bin.s4index` could
  # satisfy the post-PUT HEAD check (write_sidecar is fail-open)
  # even when the current run failed to write a fresh sidecar.
  # `${{ github.run_id }}` makes the key unique per execution so
  # the sidecar HEAD provably exercises the current run's write
  # path.
  TEST_KEY: compat/run-${{ github.run_id }}/large.bin
  # 8 MiB body — the server only writes `<key>.s4index` when the
  # frame index has > 1 entry (see service.rs gate), and
  # `pick_chunk_size` picks a 4 MiB chunk for any body in the
  # (1 MiB, 100 MiB] band (see streaming.rs), so 8 MiB yields 2
  # frames → sidecar emitted. The per-backend sidecar HEAD step
  # below treats sidecar absence as a hard failure (it's the
  # load-bearing compat assertion: the second backend PUT is where
  # most S3-API-shape divergences would surface — PutObject with
  # no Content-MD5, aws-chunked encoding, etc.) — under-sizing the
  # body would silent-pass on the single-frame elide path.
  TEST_SIZE_BYTES: "8388608"
  S4_PORT: "8014"
  # v1.5 (#143) multipart probe (real-cloud rows only): run-scoped key
  # prefix, same uniqueness rationale as TEST_KEY above. Namespaced
  # under `compat-probe/` and — unlike TEST_KEY, which is deliberately
  # left in place (see the compat-roundtrip action's note about not
  # exercising DeleteObjects there) — torn down in an always() cleanup
  # step: the probe bodies are 32 MiB each on operator-paid storage,
  # so leaving them would accrete ~1.6+ GiB/yr per backend.
  MP_PROBE_PREFIX: compat-probe/run-${{ github.run_id }}

jobs:
  # ───────────────────────── shared build ─────────────────────────
  build-s4:
    name: Build s4 binary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: compat-matrix

      - name: cargo build --release -p s4-server --bin s4
        run: cargo build --release -p s4-server --bin s4

      - name: Upload s4 binary artifact
        uses: actions/upload-artifact@v6
        with:
          name: s4-binary
          path: target/release/s4
          retention-days: 1
          if-no-files-found: error

  # ───────────────────────── docker backends ─────────────────────────
  minio-compat:
    name: MinIO compat (docker)
    needs: build-s4
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Download s4 binary
        uses: actions/download-artifact@v7
        with:
          name: s4-binary
          path: ./bin

      - name: chmod +x s4
        run: chmod +x ./bin/s4

      - name: Start MinIO
        run: |
          docker run -d --name backend \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            quay.io/minio/minio:latest \
            server /data --address :9000
          {
            echo "BACKEND_ENDPOINT=http://127.0.0.1:9000"
            echo "BACKEND_ACCESS_KEY=minioadmin"
            echo "BACKEND_SECRET_KEY=minioadmin"
            echo "BACKEND_REGION=us-east-1"
          } >> "$GITHUB_ENV"

      - name: Wait for backend + create bucket
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
        run: |
          for _ in $(seq 1 60); do
            if aws --endpoint-url "$BACKEND_ENDPOINT" --region "$BACKEND_REGION" \
                s3api list-buckets >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          aws --endpoint-url "$BACKEND_ENDPOINT" --region "$BACKEND_REGION" \
            s3api create-bucket --bucket "$TEST_BUCKET"

      - name: Round-trip + sidecar check
        uses: ./.github/actions/compat-roundtrip
        with:
          s4-binary: ./bin/s4
          backend-endpoint: ${{ env.BACKEND_ENDPOINT }}
          backend-access-key: ${{ env.BACKEND_ACCESS_KEY }}
          backend-secret-key: ${{ env.BACKEND_SECRET_KEY }}
          backend-region: ${{ env.BACKEND_REGION }}
          test-key: ${{ env.TEST_KEY }}

      - name: Dump backend log on failure
        if: failure()
        run: docker logs --tail 200 backend 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f backend 2>/dev/null || true

  garage-compat:
    name: Garage compat (docker)
    needs: build-s4
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5

      - name: Download s4 binary
        uses: actions/download-artifact@v7
        with:
          name: s4-binary
          path: ./bin

      - name: chmod +x s4
        run: chmod +x ./bin/s4

      - name: Start Garage
        run: |
          # Garage requires a TOML config + post-startup cluster
          # layout assignment. Single-node "none" replication is
          # the minimal viable config for compat-smoke purposes.
          # rpc_secret is a deterministic 32-byte hex throwaway —
          # the container is destroyed at end of job.
          cat > /tmp/garage.toml <<'EOF'
          metadata_dir = "/var/lib/garage/meta"
          data_dir = "/var/lib/garage/data"
          db_engine = "sqlite"
          replication_mode = "none"
          rpc_bind_addr = "[::]:3901"
          rpc_public_addr = "127.0.0.1:3901"
          rpc_secret = "1799bccfd7411eddcf9ebd1e0d8d4d4eb4f9b9aaa1f1f0f1e2d3c4b5a6978685"
          [s3_api]
          api_bind_addr = "[::]:3900"
          s3_region = "garage"
          root_domain = ".s3.garage.local"
          [s3_web]
          bind_addr = "[::]:3902"
          root_domain = ".web.garage.local"
          index = "index.html"
          [admin]
          api_bind_addr = "[::]:3903"
          admin_token = "admintoken"
          metrics_token = "metricstoken"
          EOF
          docker run -d --name backend \
            -v /tmp/garage.toml:/etc/garage.toml:ro \
            -p 3900:3900 -p 3901:3901 -p 3902:3902 -p 3903:3903 \
            dxflrs/garage:v1.1.0
          # Wait for garage process to come up
          for _ in $(seq 1 60); do
            if docker exec backend /garage status >/dev/null 2>&1; then
              break
            fi
            sleep 2
          done
          # Single-node layout. `garage node id -q` returns the local
          # node id as `<hex>@<addr>` directly — avoid parsing the
          # tabular `garage status` output, whose `==== HEALTHY NODES
          # ====` header line was matched by an over-broad awk pattern
          # in the v0.11 #A7 implementation, producing NODE_ID="===="
          # and failing `layout assign` with
          # `Internal error: 0 nodes match '===='`.
          NODE_ID=$(docker exec backend /garage node id -q | cut -d@ -f1)
          if [ -z "$NODE_ID" ]; then
            echo "::error::Failed to read garage node id"
            docker exec backend /garage status
            exit 1
          fi
          docker exec backend /garage layout assign -z dc1 -c 1G "$NODE_ID"
          docker exec backend /garage layout apply --version 1
          # Wait for layout to settle
          for _ in $(seq 1 30); do
            if docker exec backend /garage status | grep -q HEALTHY; then
              break
            fi
            sleep 2
          done
          # Pre-create the test bucket + access key (garage doesn't
          # support arbitrary client-side CreateBucket on a fresh
          # layout — bucket has to be declared via the garage CLI
          # and bound to a key)
          docker exec backend /garage bucket create "$TEST_BUCKET"
          docker exec backend /garage key create test-key
          docker exec backend /garage bucket allow \
            --read --write --owner "$TEST_BUCKET" --key test-key
          ACCESS=$(docker exec backend /garage key info --show-secret test-key | awk '/Key ID:/ {print $3}')
          SECRET=$(docker exec backend /garage key info --show-secret test-key | awk '/Secret key:/ {print $3}')
          if [ -z "$ACCESS" ] || [ -z "$SECRET" ]; then
            echo "::error::Failed to parse garage key info output"
            docker exec backend /garage key info --show-secret test-key
            exit 1
          fi
          {
            echo "BACKEND_ENDPOINT=http://127.0.0.1:3900"
            echo "BACKEND_ACCESS_KEY=$ACCESS"
            echo "BACKEND_SECRET_KEY=$SECRET"
            echo "BACKEND_REGION=garage"
          } >> "$GITHUB_ENV"

      # Round-trip is best-effort against Garage: dxflrs/garage:v1.1.0
      # rejects PutObject with `InvalidRequest: Bad request: Invalid
      # payload signature` when the aws-sdk-rust (inside s4-server's
      # relay) uses STREAMING-AWS4-HMAC-SHA256-PAYLOAD for the 8 MiB
      # body, which is the SDK default for unknown-length / chunked
      # uploads. Until either (a) s4-server pins UNSIGNED-PAYLOAD on
      # the relay path or (b) garage v1.2+ accepts the chunked-signed
      # variant, the round-trip is marked as a warning so the start /
      # provision steps (which DO verify the bucket-create + key-grant
      # admin-API surface) still gate the workflow. README compat
      # table reflects this as "garage: claimed but not currently
      # CI-verified — signature drift".
      - name: Round-trip + sidecar check
        id: roundtrip
        continue-on-error: true
        uses: ./.github/actions/compat-roundtrip
        with:
          s4-binary: ./bin/s4
          backend-endpoint: ${{ env.BACKEND_ENDPOINT }}
          backend-access-key: ${{ env.BACKEND_ACCESS_KEY }}
          backend-secret-key: ${{ env.BACKEND_SECRET_KEY }}
          backend-region: ${{ env.BACKEND_REGION }}
          test-key: ${{ env.TEST_KEY }}
          # garage pre-creates the bucket via CLI above
          skip-bucket-create: "true"

      - name: Warn if round-trip failed
        if: steps.roundtrip.outcome != 'success'
        run: |
          echo "::warning ::Garage round-trip failed — dxflrs/garage:v1.1.0 drifts against current aws-sdk-rust chunked-signed-payload wire shape (typical symptom: 'InvalidRequest: Bad request: Invalid payload signature' on PutObject). The provision steps above DID verify the admin-CLI surface; README compat table marks Garage as 'claimed but not currently CI-verified — signature drift' until s4-server pins UNSIGNED-PAYLOAD on the relay path or garage v1.2+ ships chunked-signed support."

      - name: Dump backend log on failure
        if: steps.roundtrip.outcome != 'success'
        run: docker logs --tail 200 backend 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f backend 2>/dev/null || true

  ceph-rgw-compat:
    name: Ceph RGW compat (docker, best-effort)
    needs: build-s4
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # NOTE: quay.io/ceph/demo is no longer actively maintained
    # upstream (the project moved to cephadm for orchestration).
    # We keep the job in the matrix because Ceph RGW is a major
    # backend in the README compat table, but mark the launch step
    # `continue-on-error: true` so an image-pull or container-init
    # failure doesn't fail the workflow as a whole. When this job
    # starts failing consistently, the fix is to either (a) pin a
    # known-working image digest, (b) switch to a community-built
    # alternative, or (c) drop ceph from the docker tier and move
    # it to the operator-CI ("claimed") row in the README compat
    # table.
    steps:
      - uses: actions/checkout@v5

      - name: Download s4 binary
        uses: actions/download-artifact@v7
        with:
          name: s4-binary
          path: ./bin

      - name: chmod +x s4
        run: chmod +x ./bin/s4

      - name: Start Ceph demo (RGW on :8080)
        id: start
        continue-on-error: true
        run: |
          docker run -d --name backend --network host \
            -e MON_IP=127.0.0.1 \
            -e CEPH_PUBLIC_NETWORK=0.0.0.0/0 \
            -e CEPH_DEMO_UID=demo \
            -e CEPH_DEMO_ACCESS_KEY=demoaccesskey \
            -e CEPH_DEMO_SECRET_KEY=demosecretkey \
            -e CEPH_DEMO_BUCKET="$TEST_BUCKET" \
            -e RGW_NAME=localhost \
            quay.io/ceph/demo:latest-quincy
          # Wait for RGW HTTP listener (demo image binds RGW on 8080
          # by default). 5 min cap — Ceph demo is heavy and can take
          # 90-180s on a cold runner.
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8080/ >/dev/null 2>&1; then
              echo "RGW ready"
              break
            fi
            sleep 5
          done
          curl -fsS http://127.0.0.1:8080/ >/dev/null
          {
            echo "BACKEND_ENDPOINT=http://127.0.0.1:8080"
            echo "BACKEND_ACCESS_KEY=demoaccesskey"
            echo "BACKEND_SECRET_KEY=demosecretkey"
            echo "BACKEND_REGION=us-east-1"
          } >> "$GITHUB_ENV"

      - name: Skip notice (Ceph startup failed)
        if: steps.start.outcome != 'success'
        run: |
          echo "::warning ::Ceph RGW demo container failed to start — skipping the round-trip step. The quay.io/ceph/demo:latest-quincy image is no longer actively maintained upstream; see compat-matrix.yml header comment for the fix paths."

      # Round-trip is also best-effort for Ceph: the demo image has
      # known wire-compat drift against current aws-sdk-rust (e.g.
      # XAmzContentSHA256Mismatch on PutObject with streaming
      # checksums) that fails the round-trip even when the container
      # starts cleanly. Marking continue-on-error so the failure is
      # surfaced as a warning rather than gating the workflow — the
      # whole job is "demo image known-broken; track upstream for a
      # successor image" per the header comment.
      - name: Round-trip + sidecar check
        id: roundtrip
        if: steps.start.outcome == 'success'
        continue-on-error: true
        uses: ./.github/actions/compat-roundtrip
        with:
          s4-binary: ./bin/s4
          backend-endpoint: ${{ env.BACKEND_ENDPOINT }}
          backend-access-key: ${{ env.BACKEND_ACCESS_KEY }}
          backend-secret-key: ${{ env.BACKEND_SECRET_KEY }}
          backend-region: ${{ env.BACKEND_REGION }}
          test-key: ${{ env.TEST_KEY }}
          # CEPH_DEMO_BUCKET pre-creates it at container init
          skip-bucket-create: "true"

      - name: Warn if round-trip failed
        if: steps.start.outcome == 'success' && steps.roundtrip.outcome != 'success'
        run: |
          echo "::warning ::Ceph RGW round-trip failed — quay.io/ceph/demo:latest-quincy is unmaintained and drifts against current aws-sdk-rust wire shape (the typical symptom is XAmzContentSHA256Mismatch on PutObject). README compat table treats Ceph RGW as 'claimed but not CI-verified' until a successor demo image lands; see compat-matrix.yml header comment for fix paths."

      - name: Dump backend log on failure
        if: steps.start.outcome == 'success' && steps.roundtrip.outcome != 'success'
        run: docker logs --tail 200 backend 2>&1 || true

      - name: Cleanup
        if: always()
        run: docker rm -f backend 2>/dev/null || true

  # ───────────────────────── real-cloud backends ─────────────────────────
  realcloud-compat:
    name: ${{ matrix.label }} compat (real cloud)
    needs: build-s4
    runs-on: ubuntu-latest
    # 30 (was 20 pre-probe): the v1.5 multipart probe adds up to two
    # 32 MiB uploads + one 32 MiB download of real-cloud transfer.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - backend: backblaze-b2
            label: Backblaze B2
            bucket_var: B2_BUCKET
            endpoint_var: B2_ENDPOINT
            region_var: B2_REGION
            access_key_secret: B2_KEY_ID
            secret_key_secret: B2_APPLICATION_KEY
          - backend: cloudflare-r2
            label: Cloudflare R2
            bucket_var: R2_BUCKET
            endpoint_var: R2_ENDPOINT
            region_var: R2_REGION
            access_key_secret: R2_ACCESS_KEY_ID
            secret_key_secret: R2_SECRET_ACCESS_KEY
          - backend: wasabi
            label: Wasabi
            bucket_var: WASABI_BUCKET
            endpoint_var: WASABI_ENDPOINT
            region_var: WASABI_REGION
            access_key_secret: WASABI_ACCESS_KEY_ID
            secret_key_secret: WASABI_SECRET_ACCESS_KEY
    steps:
      - uses: actions/checkout@v5

      - name: Pre-flight — opt-in vars + secrets check (no-op skip if missing)
        id: check
        env:
          BUCKET: ${{ vars[matrix.bucket_var] }}
          ENDPOINT: ${{ vars[matrix.endpoint_var] }}
          REGION: ${{ vars[matrix.region_var] }}
          # Codex review-R1 P2: pull the secrets in here too so the
          # opt-in gate considers a partially-configured backend
          # (vars set but secrets missing) as "not opted in" → skip,
          # not "configured" → fail-with-empty-credentials. Without
          # this, scheduling-tier failures would surface as ugly
          # AccessDenied / SignatureDoesNotMatch errors deep in the
          # round-trip step instead of the documented opt-in skip.
          ACCESS_KEY: ${{ secrets[matrix.access_key_secret] }}
          SECRET_KEY: ${{ secrets[matrix.secret_key_secret] }}
        run: |
          set -eu
          missing=""
          [ -n "${BUCKET:-}" ]     || missing="$missing ${{ matrix.bucket_var }}(vars)"
          [ -n "${ENDPOINT:-}" ]   || missing="$missing ${{ matrix.endpoint_var }}(vars)"
          [ -n "${REGION:-}" ]     || missing="$missing ${{ matrix.region_var }}(vars)"
          [ -n "${ACCESS_KEY:-}" ] || missing="$missing ${{ matrix.access_key_secret }}(secrets)"
          [ -n "${SECRET_KEY:-}" ] || missing="$missing ${{ matrix.secret_key_secret }}(secrets)"
          if [ -n "$missing" ]; then
            echo "::notice::${{ matrix.label }} compat is opt-in; skipping (missing$missing — set the vars in Settings → Variables and the secrets in Settings → Secrets to enable)."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download s4 binary
        if: steps.check.outputs.configured == 'true'
        uses: actions/download-artifact@v7
        with:
          name: s4-binary
          path: ./bin

      - name: chmod +x s4
        if: steps.check.outputs.configured == 'true'
        run: chmod +x ./bin/s4

      - name: Round-trip + sidecar check
        if: steps.check.outputs.configured == 'true'
        uses: ./.github/actions/compat-roundtrip
        with:
          s4-binary: ./bin/s4
          backend-endpoint: ${{ vars[matrix.endpoint_var] }}
          backend-access-key: ${{ secrets[matrix.access_key_secret] }}
          backend-secret-key: ${{ secrets[matrix.secret_key_secret] }}
          backend-region: ${{ vars[matrix.region_var] }}
          test-key: ${{ env.TEST_KEY }}
          # Real-cloud bucket must be pre-provisioned by the operator
          # (we can't CreateBucket against a bucket name that's
          # globally claimed; nor do we want CI to provision real
          # paid storage)
          skip-bucket-create: "true"
          # Operator-provided bucket name overrides the default to
          # avoid clashing with whatever naming convention the
          # operator's cloud account already uses
          test-bucket: ${{ vars[matrix.bucket_var] }}

      # ── v1.5 (#143) multipart uniform-parts probe ──────────────────
      #
      # Cloudflare R2 enforces "all non-trailing multipart parts must
      # have the same length" at CompleteMultipartUpload. S4's
      # compressed backend parts are content-dependent, so a ≥3-part
      # upload with mixed-compressibility parts fails on R2 unless the
      # server runs with `--uniform-multipart-parts` (v1.5 opt-in:
      # pads every non-final backend part to a deterministic per-part
      # size). Live-validated on R2 2026-07-06 — see
      # docs/use-cases/s3-compatible-backends.md (R2 section) and
      # closed issue #143. The 1 PUT + 1 GET smoke above never
      # exercises multipart at all, so the real-cloud rows get this
      # dedicated probe.
      #
      # Why ALL real-cloud rows (not just R2): the flag is
      # backend-agnostic and must round-trip everywhere, not only
      # where the uniform rule is enforced, and the matrix structure
      # makes it a single step block. The docker rows are skipped
      # deliberately: MinIO multipart is already CI-verified by the
      # testcontainers multipart_e2e suites in
      # crates/s4-server/tests/, and Garage / Ceph can't pass even the
      # single-PUT smoke (wire drift — see their job comments), so a
      # multipart probe there adds noise, not signal.
      #
      # FALSE-NEGATIVE GUARD (chunk-size forcing) — CRITICAL: modern
      # aws-cli defaults to the CRT transfer client, which ignores
      # `multipart_chunksize` and picks its own part size (observed
      # 64 MiB during the 2026-07-06 live validation) → the 32 MiB
      # body becomes ≤ 2 parts → R2's uniform rule is vacuous below
      # 3 parts and the probe proves nothing while looking green.
      # The probe therefore (a) pins
      # `preferred_transfer_client = classic` +
      # `multipart_threshold` / `multipart_chunksize = 8MB` in a
      # scratch AWS_CONFIG_FILE (never the runner's default profile,
      # so no other step's aws call is affected), and (b) hard-asserts
      # the client-visible composite ETag ends in `-4` — proof the
      # object really landed as 4 parts (3 non-trailing) — before
      # trusting any other assertion.
      - name: Multipart probe — --uniform-multipart-parts (must pass)
        if: steps.check.outputs.configured == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets[matrix.access_key_secret] }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets[matrix.secret_key_secret] }}
          AWS_REGION: ${{ vars[matrix.region_var] }}
          BACKEND_ENDPOINT: ${{ vars[matrix.endpoint_var] }}
          PROBE_BUCKET: ${{ vars[matrix.bucket_var] }}
          RUST_LOG: info,aws_smithy_runtime=warn,aws_config=warn
        run: |
          set -euo pipefail
          MP_KEY="${MP_PROBE_PREFIX}/uniform.bin"

          # Second s4 instance: same relay config as the smoke
          # round-trip (--codec cpu-zstd --dispatcher always) plus the
          # flag under test. Port 8015 stays clear of the smoke
          # instance (8014), which the composite action has already
          # stopped by now.
          ./bin/s4 \
            --endpoint-url "$BACKEND_ENDPOINT" \
            --host 127.0.0.1 \
            --port 8015 \
            --codec cpu-zstd \
            --dispatcher always \
            --uniform-multipart-parts \
            > /tmp/s4-mp-uniform.log 2>&1 &
          echo $! > /tmp/s4-mp-uniform.pid
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8015/ready >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:8015/health >/dev/null; then
            echo "::error::uniform-flag s4-server did not come up — log follows:"
            cat /tmp/s4-mp-uniform.log
            exit 1
          fi

          # 32 MiB body = 4 × 8 MiB parts alternating compressible
          # text and incompressible random bytes, so the three
          # non-trailing parts compress to wildly different sizes —
          # exactly the shape #143 fails on without the flag.
          # (python instead of `yes | head -c`: SIGPIPE from head
          # would trip pipefail.)
          python3 - <<'EOF'
          import os
          part = 8388608  # 8 MiB — must equal multipart_chunksize below
          line = b's4 compat-matrix multipart probe: highly compressible filler line\n'
          text = (line * (part // len(line) + 1))[:part]
          rand = os.urandom(part)
          with open('/tmp/mp-put.bin', 'wb') as f:
              for block in (text, rand, text, rand):
                  f.write(block)
          EOF
          BEFORE_SHA=$(sha256sum /tmp/mp-put.bin | awk '{print $1}')
          echo "multipart PUT body sha256: $BEFORE_SHA"

          # Scratch config file — see the FALSE-NEGATIVE GUARD comment
          # above this step. Applied per-invocation via AWS_CONFIG_FILE
          # so the runner's default profile is never mutated.
          cat > /tmp/aws-mp-probe-config <<'EOF'
          [default]
          s3 =
              multipart_threshold = 8MB
              multipart_chunksize = 8MB
              preferred_transfer_client = classic
          EOF

          AWS_CONFIG_FILE=/tmp/aws-mp-probe-config \
            aws --endpoint-url http://127.0.0.1:8015 \
            s3 cp /tmp/mp-put.bin "s3://${PROBE_BUCKET}/${MP_KEY}" \
            --only-show-errors

          # Part-count guard: the client-visible ETag must be a 4-part
          # composite (s4 stamps the logical composite ETag itself, so
          # this is independent of backend ETag quirks). If the
          # transfer client ignored the chunk size the suffix differs
          # (or is absent) → the probe is vacuous → hard fail. Also
          # assert HEAD reports the logical (original) ContentLength —
          # the #144 fix, live-validated on R2 2026-07-06.
          ETAG=$(aws --endpoint-url http://127.0.0.1:8015 \
            s3api head-object --bucket "$PROBE_BUCKET" --key "$MP_KEY" \
            --query ETag --output text | tr -d '"')
          CLEN=$(aws --endpoint-url http://127.0.0.1:8015 \
            s3api head-object --bucket "$PROBE_BUCKET" --key "$MP_KEY" \
            --query ContentLength --output text)
          echo "client-visible ETag: $ETAG ContentLength: $CLEN"
          case "$ETAG" in
            *-4) echo "part-count guard OK (4 parts)" ;;
            *)
              echo "::error::multipart probe vacuous — ETag '$ETAG' is not a 4-part composite; the aws-cli transfer client ignored multipart_chunksize (CRT?). See the FALSE-NEGATIVE GUARD comment in compat-matrix.yml."
              exit 1
              ;;
          esac
          if [ "$CLEN" != "33554432" ]; then
            echo "::error::multipart HEAD ContentLength $CLEN != logical 33554432 (client-transparency regression, cf. #144)"
            exit 1
          fi

          # Full-body round-trip through s4.
          AWS_CONFIG_FILE=/tmp/aws-mp-probe-config \
            aws --endpoint-url http://127.0.0.1:8015 \
            s3 cp "s3://${PROBE_BUCKET}/${MP_KEY}" /tmp/mp-get.bin \
            --only-show-errors
          AFTER_SHA=$(sha256sum /tmp/mp-get.bin | awk '{print $1}')
          echo "multipart GET body sha256: $AFTER_SHA"
          if [ "$BEFORE_SHA" != "$AFTER_SHA" ]; then
            echo "::error::multipart round-trip mismatch: before=$BEFORE_SHA after=$AFTER_SHA"
            exit 1
          fi

          # Range GET across the part-1|part-2 boundary (byte
          # 8388608): 100 bytes either side, exercising the
          # frame-index range path across a padded part seam.
          # (dd instead of `tail | head`: SIGPIPE again.)
          aws --endpoint-url http://127.0.0.1:8015 \
            s3api get-object --bucket "$PROBE_BUCKET" --key "$MP_KEY" \
            --range "bytes=8388508-8388707" /tmp/mp-range.bin >/dev/null
          dd if=/tmp/mp-put.bin of=/tmp/mp-range-expect.bin \
            bs=1 skip=8388508 count=200 status=none
          if ! cmp -s /tmp/mp-range.bin /tmp/mp-range-expect.bin; then
            echo "::error::range GET across the part boundary returned wrong bytes"
            exit 1
          fi
          echo "multipart uniform-parts probe OK (4 parts, sha256 exact, boundary range exact)"

          kill "$(cat /tmp/s4-mp-uniform.pid)" 2>/dev/null || true

      # Flag-off observation (informational, never gates): the same
      # upload WITHOUT --uniform-multipart-parts. On R2 this is
      # expected to fail Complete with `InvalidPart: All non-trailing
      # parts must have the same length` — the #143 shape. If it ever
      # starts SUCCEEDING, R2 dropped the rule and the flag/doc
      # guidance may be removable; either way we log loudly and exit
      # 0. R2-only: B2 / Wasabi don't enforce the rule, so "flag off
      # succeeds" there is the already-documented default posture and
      # probing it would only spend paid requests to confirm a
      # non-signal.
      - name: Multipart flag-off observation — R2 uniform-part rule (#143, informational)
        if: steps.check.outputs.configured == 'true' && matrix.backend == 'cloudflare-r2'
        # Belt and suspenders: the script always exits 0, but even an
        # unexpected script bug must not gate the job — this step is
        # observational by design.
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets[matrix.access_key_secret] }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets[matrix.secret_key_secret] }}
          AWS_REGION: ${{ vars[matrix.region_var] }}
          BACKEND_ENDPOINT: ${{ vars[matrix.endpoint_var] }}
          PROBE_BUCKET: ${{ vars[matrix.bucket_var] }}
          RUST_LOG: info,aws_smithy_runtime=warn,aws_config=warn
        run: |
          set -uo pipefail
          MP_KEY="${MP_PROBE_PREFIX}/flagoff.bin"

          # Third s4 instance: identical relay config, NO flag.
          ./bin/s4 \
            --endpoint-url "$BACKEND_ENDPOINT" \
            --host 127.0.0.1 \
            --port 8016 \
            --codec cpu-zstd \
            --dispatcher always \
            > /tmp/s4-mp-flagoff.log 2>&1 &
          echo $! > /tmp/s4-mp-flagoff.pid
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8016/ready >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          if ! curl -fsS http://127.0.0.1:8016/health >/dev/null 2>&1; then
            echo "::warning::flag-off observation skipped — s4-server (no flag) did not come up"
            exit 0
          fi

          # Same 32 MiB mixed-compressibility body + same forced-8MB-
          # chunking scratch config as the must-pass probe above (both
          # files are still on disk from that step, which is a hard
          # prerequisite of this one — this step is skipped whenever
          # that one fails).
          rc=0
          AWS_CONFIG_FILE=/tmp/aws-mp-probe-config \
            aws --endpoint-url http://127.0.0.1:8016 \
            s3 cp /tmp/mp-put.bin "s3://${PROBE_BUCKET}/${MP_KEY}" \
            --only-show-errors 2> /tmp/mp-flagoff-err.txt || rc=$?
          kill "$(cat /tmp/s4-mp-flagoff.pid)" 2>/dev/null || true

          if [ "$rc" -eq 0 ]; then
            echo "::warning::R2 NO LONGER enforces uniform part sizes — the flag-off ≥3-part mixed-compressibility upload SUCCEEDED. The #143 --uniform-multipart-parts workaround may be removable; re-validate manually and update docs/use-cases/s3-compatible-backends.md + docs/compatibility.md."
          elif grep -qiE "must have the same length|InvalidPart" /tmp/mp-flagoff-err.txt; then
            echo "::notice::R2 still enforces uniform part sizes (flag-off upload failed with the expected #143 InvalidPart shape) — --uniform-multipart-parts remains required for ≥3-part mixed-compressibility multipart on R2."
          else
            echo "::warning::flag-off upload failed with an UNEXPECTED error (not the #143 InvalidPart shape) — aws-cli stderr follows:"
            cat /tmp/mp-flagoff-err.txt || true
          fi
          exit 0

      - name: Dump multipart-probe s4 logs on failure
        if: failure() && steps.check.outputs.configured == 'true'
        run: |
          for f in /tmp/s4-mp-uniform.log /tmp/s4-mp-flagoff.log; do
            if [ -f "$f" ]; then
              echo "--- $f ---"
              cat "$f"
            fi
          done

      # Probe hygiene (see MP_PROBE_PREFIX comment in the workflow env
      # block for why these ARE deleted while the smoke TEST_KEY is
      # not). Everything is best-effort (`|| true`): cleanup failure
      # must never mask or override the probe verdict.
      - name: Cleanup multipart probe (kill servers + delete backend objects)
        if: always() && steps.check.outputs.configured == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets[matrix.access_key_secret] }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets[matrix.secret_key_secret] }}
          AWS_REGION: ${{ vars[matrix.region_var] }}
          BACKEND_ENDPOINT: ${{ vars[matrix.endpoint_var] }}
          BACKEND_REGION: ${{ vars[matrix.region_var] }}
          PROBE_BUCKET: ${{ vars[matrix.bucket_var] }}
        run: |
          set -u
          for pf in /tmp/s4-mp-uniform.pid /tmp/s4-mp-flagoff.pid; do
            if [ -f "$pf" ]; then
              kill "$(cat "$pf")" 2>/dev/null || true
            fi
          done
          # Objects + sidecars for both probe keys (flagoff.bin only
          # exists if R2 stopped enforcing the rule; deleting an
          # absent key is a no-op, which is fine).
          for k in \
            "${MP_PROBE_PREFIX}/uniform.bin" \
            "${MP_PROBE_PREFIX}/uniform.bin.s4index" \
            "${MP_PROBE_PREFIX}/flagoff.bin" \
            "${MP_PROBE_PREFIX}/flagoff.bin.s4index"; do
            aws --endpoint-url "$BACKEND_ENDPOINT" --region "$BACKEND_REGION" \
              s3api delete-object --bucket "$PROBE_BUCKET" --key "$k" \
              >/dev/null 2>&1 || true
          done
          # Abort any incomplete MPU left under THIS run's probe
          # prefix (the expected flag-off failure path relies on the
          # aws-cli client aborting its upload; if that abort relay
          # didn't land on the backend, the orphan would accrue
          # storage until an operator lifecycle rule catches it).
          # Scoped to this run's prefix so concurrent or historical
          # runs are never touched.
          aws --endpoint-url "$BACKEND_ENDPOINT" --region "$BACKEND_REGION" \
            s3api list-multipart-uploads --bucket "$PROBE_BUCKET" \
            --prefix "${MP_PROBE_PREFIX}/" \
            --query 'Uploads[].[Key,UploadId]' --output text 2>/dev/null \
          | while read -r key upload_id; do
              if [ -n "${upload_id:-}" ] && [ "$key" != "None" ]; then
                aws --endpoint-url "$BACKEND_ENDPOINT" --region "$BACKEND_REGION" \
                  s3api abort-multipart-upload --bucket "$PROBE_BUCKET" \
                  --key "$key" --upload-id "$upload_id" >/dev/null 2>&1 || true
              fi
            done || true
