name: Docker images (ghcr.io)

# v0.10 #B1 — publish S4 container images to GitHub Container Registry.
#
# v0.10.0 post-cut rewrite: was a single multi-arch build via QEMU
# emulation on amd64 runners (= linux/arm64 took 40-60 min, repeatedly
# timed out at the 60-min job cap on the v0.9.0 + v0.10.0 back-fill
# runs). Now uses GitHub's native arm64 runners (`ubuntu-24.04-arm`,
# free for OSS public repos since 2024-25) — each arch builds on its
# own native runner with no emulation, then a per-flavor merge job
# assembles the multi-arch manifest under the final tags.
#
# Pipeline shape:
#   build  (matrix: cpu-amd64, cpu-arm64, gpu-amd64)
#     - native runner per arch, no QEMU
#     - docker/build-push-action with `outputs: type=image,push-by-digest=true`
#     - export the resulting image digest as an artifact
#   merge  (matrix: cpu, gpu)
#     - needs: build
#     - download per-arch digests for this flavor
#     - docker buildx imagetools create with the metadata-action tags
#       to assemble + push the multi-arch manifest
#
# Two flavors share one repository under different tag suffixes:
#   ghcr.io/abyo-software/s4:<version>          (CPU build,  linux/amd64 + linux/arm64)
#   ghcr.io/abyo-software/s4:<version>-gpu      (GPU/nvCOMP, linux/amd64 only)
#
# Triggers:
#   - push of a `v*.*.*` semver tag (cuts the official image for that release)
#   - workflow_dispatch (manual rebuild — used to back-fill images for tags
#     that pre-date this workflow, e.g. `gh workflow run docker.yml --ref v0.9.0`)
#
# `latest` / `latest-gpu` are applied only when the trigger is an actual
# semver tag (workflow_dispatch on a tag also qualifies via metadata-action's
# semver pattern detection), and only for non-prerelease versions, so a
# back-fill of an older tag won't silently move `latest` backward.
#
# The GPU image is amd64 only — nvCOMP redist tarballs at
# developer.download.nvidia.com only ship a linux-x86_64 build (see
# Dockerfile.gpu's NVCOMP download URL), and there are no arm64 CUDA
# base images in the size class we want for redistribution.
#
# Caching: GHA-backed Buildx cache (`type=gha`, scoped per arch/flavor) —
# fast incremental rebuilds within a release line without persisting
# layers in any external registry.
#
# Provenance / SBOM: applied at per-arch build time (`provenance:
# mode=max`, `sbom: true`) — `docker buildx imagetools create` in
# the merge step combines existing manifests but cannot
# retroactively add attestations, so each per-arch digest carries
# its own SLSA build attestation + SPDX SBOM and the merged
# multi-arch manifest references both. Inspect via
# `docker buildx imagetools inspect`.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      push:
        description: "Push to ghcr.io (false = build only, useful for smoke-testing the workflow itself)"
        type: boolean
        default: true
        required: false
      build_ref:
        description: "Git ref (tag / branch / sha) to check out for the Dockerfile + binary context. Leave empty to use the current ref. Set to e.g. 'v0.9.0' from `--ref main` to back-fill an image for a tag that pre-dates this workflow."
        type: string
        default: ""
        required: false
      image_tag_override:
        description: "Override the image tag(s) emitted by metadata-action. Required when `build_ref` is set to a tag (otherwise the image would carry the dispatching branch's ref, not the build_ref's tag). Example: `0.9.0` produces `:0.9.0` + `:v0.9.0`."
        type: string
        default: ""
        required: false

permissions:
  # `packages: write` is required for the GITHUB_TOKEN to push to
  # ghcr.io/<owner>/<repo>. `contents: read` is the standard checkout
  # permission. No other scopes — the workflow does not open issues,
  # write to gh-pages, or touch PRs.
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Hard-coded to the canonical org so a fork that runs this workflow
  # doesn't accidentally try to push under the upstream namespace
  # (the push will simply fail with a permissions error for the fork's
  # GITHUB_TOKEN — fine — but the metadata-action tags would still
  # carry the upstream name in the build log, which is confusing).
  # Override by setting `vars.GHCR_IMAGE_NAME` at the org / repo level
  # if you fork and want to publish under your own namespace.
  IMAGE_NAME: ${{ vars.GHCR_IMAGE_NAME || 'abyo-software/s4' }}

jobs:
  # Per-arch, native-runner build. Each entry pushes a single-arch
  # image to ghcr.io by digest (no tags yet — the merge job applies
  # those after combining the per-arch digests into a manifest).
  build:
    name: build (${{ matrix.flavor }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    # Native build, no QEMU — 10-15 min comfortably covers a
    # cold-cache cargo release build. Bumped from the v0.10.0
    # pre-cut 60 min that QEMU emulation needed.
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: cpu
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            dockerfile: Dockerfile
          - flavor: cpu
            arch: arm64
            # GitHub-hosted native arm64 runner — free for OSS public
            # repos (rolled out 2024-25). No QEMU emulation, so an
            # arm64 cargo release build of this size runs in ~10-15
            # min vs the 40-60 min QEMU emulation took on amd64
            # runners.
            runner: ubuntu-24.04-arm
            platform: linux/arm64
            dockerfile: Dockerfile
          - flavor: gpu
            arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
            dockerfile: Dockerfile.gpu

    steps:
      # When `build_ref` input is set (workflow_dispatch back-fill use
      # case), check out that ref for the Dockerfile + binary context.
      # Otherwise the default ref (= the branch / tag the workflow is
      # dispatched against) is used.
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.build_ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Log in to ghcr.io using the workflow's GITHUB_TOKEN. No PAT or
      # external secret required — the `packages: write` permission at
      # the job level is sufficient because GitHub auto-grants the
      # token push access to ghcr.io packages owned by this repo.
      #
      # Skipped when the operator explicitly disabled push via the
      # workflow_dispatch input (build-only smoke test mode). When
      # not pushing we also skip the by-digest export below.
      - name: Log in to ghcr.io
        if: github.event_name != 'workflow_dispatch' || inputs.push
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-arch build that pushes the manifest blob to ghcr.io by
      # digest only — no tags applied here. The merge job assembles
      # the multi-arch manifest under the metadata-action tags after
      # collecting digests from all matrix entries of the same flavor.
      #
      # `outputs: type=image,push-by-digest=true,name-canonical=true`
      # writes the image manifest under a digest reference like
      # `ghcr.io/abyo-software/s4@sha256:<digest>`. `push: true` is
      # implicit when push-by-digest=true.
      - name: Build (${{ matrix.flavor }} ${{ matrix.arch }})
        id: build
        if: github.event_name != 'workflow_dispatch' || inputs.push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          # v0.11-audit-R2 P2 (Codex): OCI image-config labels
          # MUST attach at per-arch build time. The merge step's
          # `docker buildx imagetools create` only assembles
          # existing manifests; it can't retroactively patch
          # image-config labels. Hard-code the static labels here
          # (only `title` + `description` vary by flavor —
          # parameterised on `matrix.flavor`).
          labels: |
            org.opencontainers.image.title=s4${{ matrix.flavor == 'gpu' && '-gpu' || '' }}
            org.opencontainers.image.description=Drop-in S3-compatible storage gateway with GPU-accelerated transparent compression (${{ matrix.flavor }} build)
            org.opencontainers.image.vendor=abyo-software
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.source=https://github.com/abyo-software/s4
            org.opencontainers.image.documentation=https://github.com/abyo-software/s4#readme
            org.opencontainers.image.revision=${{ github.sha }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          # Scope the cache per arch + flavor so each runner builds
          # on a hot cache for its own arch without poisoning other
          # matrix entries' layer reuse.
          cache-from: type=gha,scope=docker-${{ matrix.flavor }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=docker-${{ matrix.flavor }}-${{ matrix.arch }}
          # v0.11-audit-R1 P2 (Codex): SLSA build provenance + SPDX
          # SBOM MUST attach at per-arch build time. `docker buildx
          # imagetools create` in the merge step combines existing
          # manifests but cannot retroactively add attestations —
          # dropping these here in the v0.10.0 native-runner rewrite
          # would have silently degraded the release-artifact
          # supply-chain guarantees the comments + README still
          # promise. Each per-arch digest now carries its own
          # attestation, and the merged manifest references both.
          provenance: mode=max
          sbom: true

      # Build-only smoke (workflow_dispatch with push=false) skips
      # both the push-by-digest output above and the artifact upload
      # below — just runs the Dockerfile through Buildx to catch
      # syntax / dependency drift without writing anywhere.
      - name: Build only (no push, smoke mode)
        if: github.event_name == 'workflow_dispatch' && !inputs.push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform }}
          push: false
          cache-from: type=gha,scope=docker-${{ matrix.flavor }}-${{ matrix.arch }}

      # Export the resulting digest as an artifact so the merge job
      # can pick it up. Filename uniqueness via run_id + flavor + arch.
      - name: Export digest
        if: github.event_name != 'workflow_dispatch' || inputs.push
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          if [ -z "$digest" ]; then
            echo "::error ::build step did not output a digest"
            exit 1
          fi
          touch "/tmp/digests/${digest#sha256:}"
      - name: Upload digest artifact
        if: github.event_name != 'workflow_dispatch' || inputs.push
        uses: actions/upload-artifact@v6
        with:
          name: digests-${{ matrix.flavor }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Per-flavor merge: download all per-arch digests for the flavor,
  # assemble a multi-arch image manifest under the metadata-action
  # tags, push to ghcr.io. SLSA provenance + SPDX SBOM are attached
  # to each per-arch digest at build time (v0.11-audit-R1 P2 fix);
  # the merged manifest references both attestations transitively.
  merge:
    name: merge manifest (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    needs: build
    # v0.11-audit-R3 P2 (Codex): `if: always()` so a failure in
    # an unrelated build-matrix leg (e.g. CPU arm64 transient
    # GHA runner hiccup) doesn't skip BOTH CPU and GPU merges.
    # Each merge then checks for its own flavor's digest
    # artifacts and skips itself if absent — gives per-flavor
    # publication independence. The push-gate keeps build-only
    # smoke runs from accidentally publishing.
    if: |
      always()
      && needs.build.result != 'cancelled'
      && (github.event_name != 'workflow_dispatch' || inputs.push)
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        flavor: [cpu, gpu]

    steps:
      - name: Download per-arch digests (${{ matrix.flavor }})
        id: download
        # v0.11-audit-R3 P2: continue-on-error so a flavor whose
        # build leg failed (= no artifacts for this flavor exist)
        # doesn't error here; the next step gates publication on
        # this step's outcome.
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          # Wildcard so we pick up cpu-amd64 + cpu-arm64 for the CPU
          # merge, and gpu-amd64 (single-arch) for the GPU merge.
          pattern: digests-${{ matrix.flavor }}-*
          merge-multiple: true

      - name: Verify digests present
        id: have_digests
        run: |
          if [ -z "$(ls -A /tmp/digests 2>/dev/null)" ]; then
            echo "::warning ::no digests for flavor=${{ matrix.flavor }} (build leg failed or skipped); skipping merge"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "digests found:"
            ls /tmp/digests
          fi

      - name: Set up Docker Buildx
        if: steps.have_digests.outputs.skip != 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to ghcr.io
        if: steps.have_digests.outputs.skip != 'true'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Same metadata-action invocation as before — emits the final
      # tags / labels per flavor. The mutable-tag gating rules
      # (push-only, non-prerelease-only, back-fill-aware) all live
      # here, after the per-arch build is already done.
      - name: Extract Docker metadata (${{ matrix.flavor }})
        if: steps.have_digests.outputs.skip != 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=${{ github.event_name == 'push' && 'auto' || 'false' }}
            suffix=${{ matrix.flavor == 'gpu' && '-gpu' || '' }},onlatest=true
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern=v{{version}}
            # v0.10 #B1-audit R4: the `{{major}}.{{minor}}` floating
            # tag must also exclude prereleases — a `v0.10.0-rc1` tag
            # push would otherwise move `0.10` to point at an unstable
            # build. `!contains(github.ref, '-')` filters SemVer
            # prerelease tags.
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' && !contains(github.ref, '-') }}
            # v0.10 #B1-audit R2 (Codex): branch + sha tags MUST NOT
            # fire during back-fill (workflow_dispatch with
            # build_ref). Otherwise `gh workflow run docker.yml --ref
            # main -f build_ref=v0.9.0` would publish the v0.9.0
            # binary under `:main` + `:sha-<current-main-sha>`,
            # which consumers of those mutable tags would interpret
            # as the latest main tip — a silent regression-by-tag.
            type=ref,event=branch,enable=${{ inputs.build_ref == '' }}
            type=sha,format=short,enable=${{ inputs.build_ref == '' }}
            # v0.10 back-fill: when `image_tag_override` is set on a
            # workflow_dispatch (typical use case: back-fill an image
            # for a tag whose source predates this workflow), emit
            # `<override>` AND `v<override>` raw tags so the immutable
            # tag pair lands on ghcr.io.
            type=raw,value=${{ inputs.image_tag_override }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag_override != '' }}
            type=raw,value=v${{ inputs.image_tag_override }},enable=${{ github.event_name == 'workflow_dispatch' && inputs.image_tag_override != '' }}
          # v0.11-audit-R2 P2: OCI labels removed from merge-step
          # metadata-action — `imagetools create` cannot retroactively
          # patch image-config labels. Labels now attach at per-arch
          # build time in the `build` job above.

      # Combine per-arch digests into a multi-arch manifest and push
      # under each computed tag. `imagetools create` builds the
      # manifest entirely server-side — no per-arch image is pulled
      # back to the runner.
      #
      # The `printf '%s ' ...` + `xargs` shape constructs one CLI
      # invocation regardless of the number of digests (1 for GPU,
      # 2 for CPU); manifest creation needs the digest list as
      # `image@sha256:<digest>` references.
      - name: Combine digests into multi-arch manifest (${{ matrix.flavor }})
        if: steps.have_digests.outputs.skip != 'true'
        working-directory: /tmp/digests
        run: |
          # Each downloaded artifact is a 0-byte file whose NAME is
          # the digest hex (without the `sha256:` prefix).
          digests=$(ls)
          if [ -z "$digests" ]; then
            echo "::error ::no digests found for flavor ${{ matrix.flavor }}"
            exit 1
          fi
          digest_refs=""
          for d in $digests; do
            digest_refs="$digest_refs ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:$d"
          done
          # Tag args from metadata-action: one `--tag <ref>` per line.
          tag_args=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_args="$tag_args --tag $tag"
          done <<EOF
          ${{ steps.meta.outputs.tags }}
          EOF
          echo "Tags to apply:"
          echo "${{ steps.meta.outputs.tags }}"
          echo "Digests to combine: $digest_refs"
          # shellcheck disable=SC2086
          docker buildx imagetools create $tag_args $digest_refs

      # Verify by inspecting one of the tags. `imagetools inspect`
      # reports the manifest contents (per-arch image refs, SLSA
      # provenance, SBOM) without pulling anything to the runner.
      - name: Inspect merged manifest (${{ matrix.flavor }})
        if: steps.have_digests.outputs.skip != 'true'
        run: |
          first_tag=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          if [ -z "$first_tag" ]; then
            echo "::warning ::no tags emitted — skipping inspect"
            exit 0
          fi
          docker buildx imagetools inspect "$first_tag"
