name: CI

# v0.11 wave-1 #A5 — every JavaScript action is pinned to a major
# tag that runs on Node.js 24 to clear the deprecation gate landing
# 2026-09-16. Specifically: actions/checkout@v5 (latest v6.0.3),
# actions/upload-artifact@v6 (latest v7.0.1), actions/download-
# artifact@v7 (latest v8.0.1), actions/github-script@v8 (latest
# v9.0.0), codecov/codecov-action@v5, docker/build-push-action@v7,
# docker/login-action@v4, docker/setup-buildx-action@v4,
# docker/metadata-action@v6, aws-actions/configure-aws-credentials@v6,
# azure/setup-helm@v5. All majors verified published via
# `gh api /repos/<owner>/<repo>/releases/latest -q .tag_name` AND
# live-tested in CI runs since commit 3332f3e (the wave-1 push) —
# every subsequent push has resolved them cleanly. v0.11 integrated
# audit R5 / R6 flagged these as P1 "unpublished" twice; both were
# false positives caused by Codex's review sandbox being unable to
# reach github.com to verify tag existence. Future audits should
# treat "action version not found" claims as sandbox-limited unless
# accompanied by a failing CI run.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

permissions:
  # `issues: write` is needed by the failure-notification step (opens an
  # auto-issue when the workflow fails on a push to main, so the
  # owner gets an email via their default notification settings —
  # GitHub's per-user "failed workflows only" Actions notification can
  # be unreliable / silenced; an issue is durable and auditable).
  contents: read
  issues: write

jobs:
  test:
    name: cargo test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets
      - name: cargo test (default cases)
        run: cargo test --workspace --release
      - name: proptest medium-stress (10K cases / property、~2 min)
        # push / PR で早期に fuzz failure を検出する。1M cases は nightly
        # job の責務。10K でも default の 256-2048 より遥かに広く branch を踏む。
        env:
          PROPTEST_CASES: "10000"
        run: |
          cargo test --workspace --release \
            --test fuzz_parsers --test fuzz_server --test fuzz_advanced
      - name: Upload proptest-regressions artifact (on failure)
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: proptest-regressions-${{ github.run_id }}
          path: "**/*.proptest-regressions"
          if-no-files-found: ignore
      - name: cargo test --features nvcomp-gpu (build-only, no GPU on CI)
        run: cargo build --workspace --features s4-server/nvcomp-gpu
        env:
          # NVCOMP_HOME is unset → vendored build.rs without nvcomp feature works
          # but we want to verify the feature *compiles* against a stub
          NVCOMP_HOME: ""
        # Allow failure since CI lacks NVCOMP SDK; gate is "compile cleanly"
        continue-on-error: true

  # v0.8.8 #92: cargo audit regression guard. Failing this job blocks merge
  # so new RUSTSEC advisories are surfaced fast. The three rustls-webpki
  # ignores are tracked in #91 — they live in the aws-sdk-rust TLS stack
  # (hyper-rustls 0.24 → rustls 0.21 → rustls-webpki 0.101) which is pinned
  # transitively by the upstream AWS SDK; we cannot bump them in isolation
  # without forking aws-smithy-http-client. The rustls-pemfile unmaintained
  # warning (RUSTSEC-2025-0134) is tracked in #92 — this is a *runtime*
  # dependency (rustls-pemfile 2.x, used at production HTTPS startup in
  # crates/s4-server/src/tls.rs to load the operator-supplied cert/key
  # PEM files), not dev-only as the comment previously claimed. Risk
  # acceptance is documented in detail in
  # docs/security/cargo-audit-ignores.md (operator-controlled PEM input
  # = no adversary-reachable parser path).
  security-audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-audit
        # Pin to ~0.22 — cargo-audit can change its CLI between minors;
        # blast radius of a CLI break here is "CI red on next push" which
        # is loud enough that updating the pin is fine when it happens.
        run: cargo install cargo-audit --locked --version "^0.22"
      - name: cargo audit (CVE + yanked + unmaintained)
        run: |
          cargo audit \
            --ignore RUSTSEC-2026-0098 \
            --ignore RUSTSEC-2026-0099 \
            --ignore RUSTSEC-2026-0104 \
            --ignore RUSTSEC-2025-0134

  e2e:
    name: E2E (MinIO Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --ignored (MinIO E2E)
        run: cargo test --workspace --release -- --ignored --test-threads=1
        timeout-minutes: 20

  # v0.8.18 P6: code coverage. cargo-llvm-cov produces an lcov.info
  # we upload to Codecov for the badge + per-PR diff coverage
  # comments. Runs only on push to main (not PR) so the badge
  # tracks the merged state; PRs see the cargo test job's pass/fail
  # without paying for the slower coverage instrumentation.
  coverage:
    name: code coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked --version "^0.6"
      - name: cargo llvm-cov
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info \
            --ignore-filename-regex '(tests?/__fuzz__|tests/fuzz_)'
      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./lcov.info
          fail_ci_if_error: false   # Codecov flakes shouldn't fail CI
          token: ${{ secrets.CODECOV_TOKEN }}

  # v0.8.18 P6: ad-hoc benchmark smoke. The repo's three
  # `examples/bench_*.rs` binaries are end-to-end performance
  # probes (frame overhead, full pipeline, SSE throughput). We run
  # them in `release` profile with a short input so the CI signal
  # is "build + execute cleanly" — not a regression baseline.
  # The per-commit regression-tracking baseline lives in the
  # sibling `bench.yml` workflow (criterion + benchmark-action,
  # gh-pages branch); this smoke job stays as the "build cleanly"
  # gate for the example binaries themselves.
  bench-smoke:
    name: bench smoke (examples)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: build bench examples
        run: |
          cargo build --release -p s4-server \
            --example bench_framed_overhead \
            --example bench_pipeline \
            --example bench_sse_throughput
        timeout-minutes: 10
      - name: run bench_framed_overhead
        run: cargo run --release -p s4-server --example bench_framed_overhead 2>&1 | tee -a bench.log
        timeout-minutes: 3
        continue-on-error: true
      - name: upload bench log
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: bench-${{ github.run_id }}
          path: bench.log
          if-no-files-found: ignore

  # v0.10 wave-2 #A4 + v0.11 #A4: 32-bit (i686-unknown-linux-gnu) runtime
  # smoke. Builds + executes the `s4-codec` test suite on i686 (already
  # passed since v0.9 #106-32bit but now gated in CI so a regression
  # surfaces immediately), then builds + runs the `s4` binary's
  # `--help` / `--version`, then v0.11 #A4 adds an end-to-end PUT/GET
  # round-trip through the i686 `s4` binary fronting an amd64 MinIO
  # container so the README §"Supported targets" 32-bit row can claim
  # actual wire-level parity (not just "process boots, prints --help").
  #
  # If the `s4-server` build step fails (= one of its deps —
  # aws-sdk-rust / rustls / ring — doesn't link cleanly on i686
  # with stock gcc-multilib + libc6-dev-i386), the smoke step is
  # skipped and the job records "compiles only, runtime untested"
  # rather than going red — the codec/config test step still gates
  # on the regression-detection use case.
  #
  # The PUT/GET step itself runs `continue-on-error: true` until a
  # green push is observed on `main`. Rationale: the i686 toolchain
  # exercises a code path (32-bit pointer-width, alternative `Arc`
  # atomics, isize-clamped buffer allocations) that has historically
  # tripped on bugs we did not anticipate; landing the job in
  # advisory mode lets us see the first failure in CI without
  # immediately turning the whole pipeline red while a fix lands in
  # a follow-up (v0.11.x) commit. Promote to required once observed
  # green for a stretch of main pushes.
  i686-runtime-smoke:
    name: i686 runtime smoke
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu
      - uses: Swatinem/rust-cache@v2
        with:
          key: i686
      - name: install i686 multilib (gcc + libc dev + runtime)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y \
            gcc-multilib \
            libc6-dev-i386 \
            libc6:i386
      - name: cargo test --target i686 (s4-codec + s4-config)
        run: |
          cargo test --target i686-unknown-linux-gnu \
            -p s4-codec -p s4-config --release
        timeout-minutes: 15
      - name: cargo build --target i686 (s4-server binary)
        # The aws-sdk-rust / rustls / ring stack pulls C-source
        # crypto libs that may not have a stock i386 path. If this
        # step fails the README claim stays "cargo check parity" and
        # the smoke steps below are skipped — a hard fail here would
        # also incorrectly suggest the codec tests above regressed,
        # so we record-and-continue instead.
        id: build-s4
        continue-on-error: true
        run: |
          cargo build --target i686-unknown-linux-gnu --release \
            -p s4-server --bin s4
        timeout-minutes: 15
      - name: smoke — s4 --help (i686 binary)
        if: steps.build-s4.outcome == 'success'
        run: ./target/i686-unknown-linux-gnu/release/s4 --help > /dev/null
      - name: smoke — s4 --version (i686 binary)
        if: steps.build-s4.outcome == 'success'
        run: ./target/i686-unknown-linux-gnu/release/s4 --version
      # v0.11 #A4: full PUT/GET round-trip — i686 `s4` binary in front
      # of a stock amd64 MinIO container, using AWS CLI as the client.
      # MinIO runs as host docker (not a service container) so we can
      # control `--rm` + name-based cleanup and so the i686 process talks
      # to it over plain TCP on the host. The single PUT + single GET +
      # body equality check exercises:
      #   - i686 hyper / rustls TLS-off listener (S4 → client)
      #   - i686 aws-sdk-rust SigV4 signer (S4 → MinIO backend)
      #   - i686 `Bytes` / `Vec<u8>` paths through the CPU-zstd codec
      # which together are everything an operator would hit on a 32-bit
      # deployment beyond the `--help` smoke.
      - name: start MinIO (amd64 backend for the i686 s4 process)
        if: steps.build-s4.outcome == 'success'
        id: minio
        # MinIO setup runs on the same advisory path as the PUT/GET
        # step that follows: a Docker Hub / MinIO startup flake would
        # otherwise red the i686 job even though the documented
        # rollout posture is "non-blocking until a stretch of green
        # main pushes is observed". Promote alongside the PUT/GET
        # step once both have been stable.
        continue-on-error: true
        run: |
          docker run -d --rm --name s4-i686-minio \
            -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          # wait for MinIO /minio/health/live (max 60s)
          for i in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:9000/minio/health/live >/dev/null 2>&1; then
              echo "MinIO is live (after ${i}s)"
              break
            fi
            if [ "$i" = "60" ]; then
              echo "MinIO failed to come up in 60s" >&2
              docker logs s4-i686-minio || true
              exit 1
            fi
            sleep 1
          done
      - name: PUT/GET round-trip through i686 s4 binary
        if: steps.build-s4.outcome == 'success' && steps.minio.outcome == 'success'
        id: i686-smoke
        # continue-on-error keeps a first-time 32-bit runtime bug from
        # turning the CI badge red while the fix lands in v0.11.x; once
        # we observe a stretch of green pushes on main this guard can
        # be dropped. See the job header comment.
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: minioadmin
          AWS_SECRET_ACCESS_KEY: minioadmin
          # v0.11 #A7 cross-agent audit: set both `AWS_REGION` and
          # `AWS_DEFAULT_REGION` — SDK v2 prefers `AWS_REGION` while
          # CLI v2 reads either; defensive for variations across the
          # AWS SDK callers in s4-server's startup path.
          AWS_REGION: us-east-1
          AWS_DEFAULT_REGION: us-east-1
        run: |
          set -eux
          # 1. start i686 s4 server in the background, pointing at MinIO
          ./target/i686-unknown-linux-gnu/release/s4 \
            --host 127.0.0.1 --port 8014 \
            --endpoint-url http://127.0.0.1:9000 \
            --codec cpu-zstd \
            --log-format json \
            > s4-i686.log 2>&1 &
          S4_PID=$!
          echo "s4 PID=${S4_PID}"
          trap 'kill ${S4_PID} 2>/dev/null || true; wait ${S4_PID} 2>/dev/null || true' EXIT
          # 2. wait for S4 /ready (max 30s); /ready returns 200 only once
          #    the backend ListBuckets call succeeds, so this also doubles
          #    as a backend-reachability gate.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8014/ready >/dev/null 2>&1; then
              echo "S4 is ready (after ${i}s)"
              break
            fi
            if ! kill -0 "${S4_PID}" 2>/dev/null; then
              echo "S4 process exited during readiness wait" >&2
              cat s4-i686.log >&2 || true
              exit 1
            fi
            if [ "$i" = "30" ]; then
              echo "S4 /ready did not return 200 in 30s" >&2
              cat s4-i686.log >&2 || true
              exit 1
            fi
            sleep 1
          done
          # 3. PUT a small object through S4 (= it lands in MinIO compressed)
          aws --endpoint-url http://127.0.0.1:8014 \
            s3 mb s3://i686-smoke
          echo 'hello-from-i686-s4' > /tmp/i686-payload.txt
          aws --endpoint-url http://127.0.0.1:8014 \
            s3 cp /tmp/i686-payload.txt s3://i686-smoke/k
          # 4. GET it back through S4 (= S4 transparently decompresses)
          aws --endpoint-url http://127.0.0.1:8014 \
            s3 cp s3://i686-smoke/k /tmp/i686-roundtrip.txt
          # 5. byte-equality vs the original
          diff /tmp/i686-payload.txt /tmp/i686-roundtrip.txt
          echo "i686 s4 PUT/GET round-trip succeeded"
      - name: upload s4-i686 server log (always)
        if: always() && steps.build-s4.outcome == 'success'
        uses: actions/upload-artifact@v6
        with:
          name: s4-i686-server-log-${{ github.run_id }}
          path: s4-i686.log
          if-no-files-found: ignore
      - name: stop MinIO (cleanup)
        if: always() && steps.minio.outcome == 'success'
        run: docker rm -f s4-i686-minio || true

  # Auto-open a GitHub issue when CI fails on a push to main (only on
  # push, not PR — PR failures are visible inline; main failures are
  # the ones operators / on-call need to act on).
  #
  # v0.8.18 hardening: dedup by SHA so a rerun of the same failing
  # commit doesn't spam a fresh issue per job, and skip creation if a
  # later commit on main has since landed and passed (= the failure
  # was transient or already fixed). Closing of stale issues for
  # later-passing commits is handled by `.github/workflows/ci-close-resolved.yml`.
  notify-on-failure:
    name: Open issue on CI failure
    runs-on: ubuntu-latest
    needs: [test, e2e, security-audit, i686-runtime-smoke]
    if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const shortSha = context.sha.slice(0, 7);
            const expectedTitlePrefix = `CI failed on main — ${shortSha}`;
            // Dedup: skip creation when an open `ci-failure` issue
            // already references this SHA (multiple needed-jobs
            // failing in the same workflow run, or a rerun on the
            // same SHA).
            const existing = await github.paginate(
              github.rest.issues.listForRepo,
              {
                owner: context.repo.owner,
                repo:  context.repo.repo,
                state: "open",
                labels: "ci-failure",
                per_page: 100,
              }
            );
            const dup = existing.find(i => i.title.startsWith(expectedTitlePrefix));
            if (dup) {
              core.info(`Skipping auto-issue: #${dup.number} already tracks this SHA`);
              return;
            }
            const title = `${expectedTitlePrefix} (${new Date().toISOString().slice(0, 10)})`;
            const body = [
              `CI workflow failed on a push to main.`,
              ``,
              `**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `**Commit:** ${context.sha}`,
              `**Triggered by:** @${context.actor}`,
              ``,
              `Likely causes: cargo fmt drift, clippy regression, test failure, or an upstream dep break.`,
              ``,
              `Triage:`,
              `- \`gh run view ${context.runId} --log-failed\` to inspect`,
              `- if the only failure is fmt, run \`cargo fmt --all\` locally and push the fix`,
              ``,
              `This issue is **auto-closed** by the \`ci-close-resolved\` workflow once a subsequent main commit lands with a green CI run, so transient / already-fixed failures don't accumulate.`,
              ``,
              `🤖 auto-opened by .github/workflows/ci.yml`,
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title, body,
              labels: ["ci-failure"],
            });
