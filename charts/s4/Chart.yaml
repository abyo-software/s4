apiVersion: v2
name: s4
description: Drop-in S3-compatible storage gateway with GPU-accelerated transparent compression.
type: application
# Chart version follows the chart itself; bump on chart-only changes.
# 0.2.0: v0.10 #B1 — `image.repository` default flipped from the
# never-published `docker.io/abyosoftware/s4` to the now-published
# `ghcr.io/abyo-software/s4`. Minor bump per SemVer because a
# `helm upgrade` with no override now points at a different image
# repo (chart behavior change, not just appVersion drift).
# 0.2.1: v0.10.0 cut — appVersion bump only, no chart-shape change.
# 0.2.2: v0.11.0 cut — appVersion bump only, no chart-shape change.
# 0.2.3: v1.0.0 cut — appVersion bump only, no chart-shape change.
# 0.2.4: v1.1.0 cut — appVersion bump only, no chart-shape change.
# 0.2.5: v1.2.0 cut — appVersion bump only, no chart-shape change.
#        Note: chart's own version stays in 0.2.x. Chart-shape
#        SemVer is independent of appVersion (Helm convention);
#        the chart's values.yaml key freeze is the v1.0 contract,
#        not the chart's own SemVer line, which can stay 0.x as
#        long as no key shape break is shipped. See README §Stability
#        for the values.yaml key set that IS frozen.
# 0.3.0: s4 v1.3 — additive `marketplace.productCode` key (default ""):
#        wires --marketplace-product-code for AWS Marketplace paid-
#        container deployments (boot-time RegisterUsage entitlement
#        check + per-pod hourly metering, EKS/ECS/Fargate + IRSA only).
#        Minor bump because the values.yaml key set changed
#        (chart-shape change); the default ("") rendering is
#        byte-identical to 0.2.5.
# 0.3.4: s4 v1.2.2 — additive `marketplace.usageDimension` key (default ""):
#        wires --marketplace-usage-dimension for AWS Marketplace products
#        with a custom ("externally metered") dimension. When set (with
#        productCode), each pod uses the MeterUsage API (boot DryRun
#        entitlement + per-pod hourly MeterUsage records) instead of
#        RegisterUsage. Minor bump because the values.yaml key set changed;
#        the default ("") rendering is byte-identical to 0.3.1 (RegisterUsage
#        route preserved). Note: chart versions 0.3.2/0.3.3 were published to
#        the Marketplace ECR as appVersion-only bumps (no chart-shape change).
# 0.3.6: s4 v1.4.0 — appVersion-only bump (client-transparent S3-compat
#        campaign: ETag=MD5(original), reserved s4-* metadata stripped from
#        the client view, multipart composite ETag, write-path conditionals).
#        Server-side only; no chart-shape change, default rendering
#        byte-identical to 0.3.5.
# 0.3.7: s4 v1.4.1 — Marketplace E2E findings closed (appVersion-only bump):
#        NoVerify auth (gateway now accepts ANY signed client, not just the
#        gateway's own IRSA/instance-role STS AKID — fixes the 403
#        NotSignedUp on every external client); UploadPart no longer pins
#        the session checksum algorithm at CreateMultipartUpload time
#        (fixes the `aws s3 cp` 8 MiB+ crc64nvme mismatch on CLI ≥ 2.30);
#        ListObjects(V2) is client-transparent by default (matches
#        HEAD/GET so `aws s3 sync` / `rclone` no longer over-transfer —
#        opt out with `--physical-listings`). Server-side only; no
#        chart-shape change, default rendering byte-identical to 0.3.6.
version: 0.3.7
# appVersion tracks the s4-server release shipped on crates.io / ghcr.io.
appVersion: "1.4.1"
kubeVersion: ">=1.24.0-0"
home: https://github.com/abyo-software/s4
sources:
  - https://github.com/abyo-software/s4
keywords:
  - s3
  - object-storage
  - compression
  - gpu
  - nvcomp
  - zstd
  - gateway
maintainers:
  - name: abyo-software
    email: abyo.software@gmail.com
    url: https://github.com/abyo-software
icon: https://raw.githubusercontent.com/abyo-software/s4/main/.github/assets/logo.png
annotations:
  artifacthub.io/license: Apache-2.0
  artifacthub.io/links: |
    - name: Source
      url: https://github.com/abyo-software/s4
    - name: Issues
      url: https://github.com/abyo-software/s4/issues
