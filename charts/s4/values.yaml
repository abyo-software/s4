# Default values for s4.
# This is a YAML-formatted file. Lines starting with `# --` are doc comments
# rendered by `helm-docs`; keep them in sync with charts/s4/README.md.

# -- Number of S4 gateway replicas. S4 itself is stateless (state lives in the
# backing S3 bucket), so this can be scaled horizontally. Two replicas give a
# basic rolling-update floor.
replicas: 2

image:
  # -- Container image registry + repository. Official images are published
  # to GitHub Container Registry (ghcr.io) on every `v*.*.*` tag by
  # `.github/workflows/docker.yml`. ghcr.io packages owned by
  # `abyo-software` are public, so no `pullSecrets` are required for the
  # default value.
  #
  # For the GPU (nvCOMP) build, append `-gpu` to the tag — both flavors
  # share this repository, e.g. `ghcr.io/abyo-software/s4:0.9.0-gpu`.
  repository: ghcr.io/abyo-software/s4
  # -- Image tag. Defaults to .Chart.appVersion when empty. For the GPU
  # build, override with `--set image.tag=<version>-gpu` and also set
  # `--set gpu.enabled=true`.
  tag: ""
  pullPolicy: IfNotPresent
  # -- Image pull secrets, e.g. [{name: regcred}]. Not needed for the
  # default public ghcr.io repository; only required if you mirror the
  # image to a private registry.
  pullSecrets: []

# -- Override generated names.
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- If true, a ServiceAccount is created. If false, an existing one is used.
  create: true
  # -- Annotations to add to the ServiceAccount (e.g. for IRSA on EKS).
  annotations: {}
  # -- Name to use. If create=true and name is empty, a name is generated.
  name: ""

backend:
  # -- REQUIRED. Backend S3 endpoint URL the gateway forwards to.
  # Example: https://s3.us-east-1.amazonaws.com
  endpointUrl: ""
  # -- Optional AWS region. Set as the AWS_REGION env var on the pod; some
  # SDK code paths require this even when --endpoint-url is explicit.
  region: ""

marketplace:
  # -- AWS Marketplace paid-container product code (chart 0.3.0, s4 v1.3).
  # Leave empty (default) for the free ghcr.io deployment — the flag is then
  # not passed at all and the gateway behaves bit-for-bit like every earlier
  # release. When set (Marketplace subscribers only), each pod calls the AWS
  # Marketplace Metering Service `RegisterUsage` once at boot: success
  # confirms your subscription and starts per-pod hourly metering (billed on
  # your AWS invoice); failure (not subscribed / wrong code / platform not
  # supported) makes the pod exit non-zero, so a non-entitled deployment
  # crash-loops instead of serving.
  #
  # Requirements (EKS):
  #   1. The pod must run on EKS / ECS / Fargate — RegisterUsage is rejected
  #      with PlatformNotSupported anywhere else (plain docker, bare EC2).
  #   2. The pod's IAM identity needs the metering permission for the route
  #      in use (see usageDimension below): `aws-marketplace:RegisterUsage`
  #      for the default hourly route, or `aws-marketplace:MeterUsage` for
  #      the custom-dimension route. On EKS use IRSA — attach a policy like
  #      this to the pod role (grant both actions if unsure):
  #
  #        {
  #          "Version": "2012-10-17",
  #          "Statement": [
  #            {
  #              "Effect": "Allow",
  #              "Action": [
  #                "aws-marketplace:RegisterUsage",
  #                "aws-marketplace:MeterUsage"
  #              ],
  #              "Resource": "*"
  #            }
  #          ]
  #        }
  #
  #      and point the chart's ServiceAccount at the role:
  #
  #        serviceAccount:
  #          annotations:
  #            eks.amazonaws.com/role-arn: arn:aws:iam::<ACCOUNT_ID>:role/s4-marketplace
  #
  # The product code itself is shown on the product's AWS Marketplace
  # listing page / in the fulfillment instructions after subscribing.
  productCode: ""
  # -- AWS Marketplace custom ("externally metered") dimension API name
  # (chart 0.3.4, s4 v1.2.2). Leave empty (default) for products that let
  # AWS meter per-pod hours automatically (the RegisterUsage route above).
  # Set it ONLY when your product's pricing defines a custom dimension
  # (catalog Type `ExternallyMetered`, e.g. an hourly dimension you price
  # per unit): the gateway then uses the MeterUsage API instead — a DryRun
  # at boot confirms entitlement (fail-closed) and a background task sends
  # one MeterUsage record per pod per hour against this dimension. The value
  # is the dimension's API identifier — the catalog `Dimensions[].Key`
  # (e.g. `PID1`), NOT the human-readable display name (the display name is
  # rejected with InvalidUsageDimension). Requires `aws-marketplace:MeterUsage`
  # (see IAM note above). Only honored when productCode is also set.
  usageDimension: ""
  # -- Value-based Marketplace metering (chart 0.4.0, s4 v1.5): meter the
  # storage the gateway is currently avoiding on the backend (integer GiB
  # from the savings ledger) as the hourly MeterUsage quantity, instead of
  # the constant 1 pod-hour. Use ONLY with a product dimension priced per
  # GiB-saved-hour (e.g. `GBSavedHours` on the "S4 Metered Savings"
  # listing) — requires productCode AND usageDimension to be set too.
  #
  # SINGLE METERING GATEWAY ONLY: every metering replica bills the full
  # stock its ledger reports and AWS does not dedup MeterUsage across
  # callers, so the chart REFUSES to render with replicas > 1 while this
  # is enabled. The ledger state file lives on a PVC by default — with
  # persistence disabled a pod restart resets the ledger and under-meters
  # (your favor, but inaccurate) until the counters rebuild.
  meteredSavings:
    enabled: false
    persistence:
      # -- Persist the savings ledger (/var/lib/s4/ledger.json) on a PVC.
      enabled: true
      size: 1Gi
      # -- Empty = cluster default StorageClass.
      storageClass: ""

# -- Default compression codec. One of: cpu-zstd, nvcomp-zstd, nvcomp-bitcomp,
# nvcomp-gdeflate, identity. nvcomp-* require gpu.enabled=true and a GPU build
# of the image (see Dockerfile.gpu).
codec: cpu-zstd

# -- CPU zstd level (1-22). Only meaningful for cpu-zstd / when sampling
# selects cpu-zstd at runtime.
zstdLevel: 3

# -- Codec dispatcher: "always" pins to .codec, "sampling" auto-selects per
# object using entropy + magic-byte sampling.
dispatcher: sampling

# -- Log format: "pretty" or "json". JSON is recommended in production
# (CloudWatch Logs / fluent-bit friendly).
logFormat: json

# -- Optional OpenTelemetry OTLP gRPC endpoint, e.g. http://otel-collector:4317.
otlpEndpoint: ""

gpu:
  # -- Enable GPU scheduling. When true, the pod requests
  # `nvidia.com/gpu: <count>` and a node selector / runtime class can be
  # applied. The image MUST be the GPU build (Dockerfile.gpu) for nvCOMP to
  # actually load.
  enabled: false
  # -- GPUs requested per pod.
  count: 1
  # -- Node selector for GPU nodes (overlaid on top of .nodeSelector).
  nodeSelector:
    nvidia.com/gpu.present: "true"
  # -- Optional runtime class (e.g. "nvidia" on NVIDIA Container Toolkit).
  runtimeClassName: ""

tls:
  # -- Enable HTTPS termination on the listener. When true, the chart wires
  # --tls-cert / --tls-key from one of the sources below.
  enabled: false
  # -- Inline PEM (multi-line). If both `cert` and `key` are non-empty, the
  # chart renders a Secret and mounts it. Use `existingSecret` instead for
  # cert-manager-managed certs.
  cert: ""
  key: ""
  # -- Reference to an existing tls-type Secret (e.g. one issued by
  # cert-manager). Keys default to the kubernetes.io/tls convention
  # (tls.crt / tls.key); override below if your secret uses different keys.
  existingSecret: ""
  certKey: tls.crt
  keyKey: tls.key

policy:
  # -- AWS-style bucket-policy JSON, multi-line string. When non-empty the
  # chart renders a ConfigMap and passes --policy /etc/s4/policy.json.
  # See README.md "Bucket policy enforcement" for the supported subset.
  json: ""
  # -- Reference to a pre-existing ConfigMap with key `policy.json`. Mutually
  # exclusive with `policy.json`.
  existingConfigMap: ""

service:
  type: ClusterIP
  port: 8014
  # -- Annotations on the Service object (e.g. for AWS NLB tuning if you
  # change type to LoadBalancer).
  annotations: {}

ingress:
  # -- Most production deployments will front S4 with an Ingress / Gateway
  # for path/host routing. Disabled by default.
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: s4.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: s4-tls
  #    hosts:
  #      - s4.example.com

resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: "2"
    memory: 2Gi

podAnnotations: {}
podLabels: {}

# -- Pod-level securityContext. S4 binary runs as uid 10001 in the official
# Dockerfile.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

# -- Container-level securityContext.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

nodeSelector: {}
tolerations: []
affinity: {}

# -- Extra CLI arguments appended verbatim after every chart-managed flag
# (chart 0.5.0, s4 #149) — the operator escape hatch for server flags the
# chart has no dedicated value for. Example:
#   extraArgs:
#     - --read-timeout-seconds=300
# Appended last, but note the s4 binary rejects a flag passed twice
# (clap), so don't repeat a chart-managed flag here — use the chart value.
extraArgs: []

# -- Extra environment variables (list of {name, value} or {name, valueFrom}).
extraEnv: []

# -- Extra volumes / mounts for the pod.
extraVolumes: []
extraVolumeMounts: []

# -- Liveness/readiness probes hit /health on the listener port.
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    enabled: true
    initialDelaySeconds: 2
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
